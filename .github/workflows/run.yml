name: Job Search Bot 🤖

on:
  schedule:
    - cron: "30 3 * * *"   # هر روز ساعت ۷ صبح ایران
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Restore seen_jobs cache
        uses: actions/cache@v4
        with:
          path: seen_jobs.txt
          key: seen-jobs-${{ github.run_id }}
          restore-keys: seen-jobs-

      - name: Run Bot
        env:
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          RAPIDAPI_KEY:        ${{ secrets.RAPIDAPI_KEY }}
          GSHEET_CREDENTIALS:  ${{ secrets.GSHEET_CREDENTIALS }}
          GSHEET_ID:           ${{ secrets.GSHEET_ID }}
          CF_WORKER_URL:       ${{ secrets.CF_WORKER_URL }}
          CF_WORKER_SECRET:    ${{ secrets.CF_WORKER_SECRET }}
          AI_PROVIDER:         ${{ secrets.AI_PROVIDER }}
          AI_API_KEY:          ${{ secrets.AI_API_KEY }}
          AI_MODEL:            ${{ secrets.AI_MODEL }}
          AI_BASE_URL:         ${{ secrets.AI_BASE_URL }}
          ADZUNA_APP_ID:       ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_API_KEY:      ${{ secrets.ADZUNA_API_KEY }}
          TELEGRAPH_TOKEN:     ${{ secrets.TELEGRAPH_TOKEN }}
          USER_SKILLS:         ${{ secrets.USER_SKILLS }}
          USER_RESUME:         ${{ secrets.USER_RESUME }}
        run: python bot.py
